version: 2

models:
  - name: stg_sales
    description: Cleaned and typed sales transactions
    columns:
      - name: order_id
        tests:
          - not_null
          - unique
      - name: customer_id
        tests:
          - not_null
      - name: total_price
        tests:
          - not_null

  - name: stg_customers
    description: Cleaned customer master data
    columns:
      - name: customer_id
        tests:
          - not_null
          - unique
